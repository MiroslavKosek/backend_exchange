name: CI/CD

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  ci:
    name: Build, Lint, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: pylint app tests

      - name: Test
        run: pytest --cov=app --cov-report=xml

      - name: Build Docker image
        run: docker build -t backend_exchange:${{ github.sha }} .

  deploy:
      name: Deploy to Azure (main)
      runs-on: ubuntu-latest
      needs: ci
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      environment:
        name: production

      env:
        ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
        ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
        IMAGE_NAME: ${{ vars.IMAGE_NAME }}

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Log in to Azure Container Registry
          uses: azure/docker-login@v2
          with:
            login-server: ${{ env.ACR_LOGIN_SERVER }}
            username: ${{ env.ACR_USERNAME }}
            password: ${{ env.ACR_PASSWORD }}

        - name: Build and push container image
          run: |
            IMAGE_TAG=${{ github.sha }}
            IMAGE_URI=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}
            docker build -t ${IMAGE_URI} .
            docker push ${IMAGE_URI}
            echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_ENV

        - name: Deploy container image to Azure Web App
          uses: azure/webapps-deploy@v3
          with:
            app-name: ${{ env.AZURE_WEBAPP_NAME }}
            publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
            images: ${{ env.IMAGE_URI }}
